spring:
  profiles:
    active: local
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jackson:
    serialization:
      write-dates-as-timestamps: false
  neo4j:
    uri: ${NEO4J_URI}
    authentication:
      username: ${NEO4J_USERNAME}
      password: ${NEO4J_PASSWORD}

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: 3600000

openai:
  api-key: ${OPENAI_API_KEY}
  model: gpt-4o-mini
---
spring:
  config:
    activate:
      on-profile: local
  jpa:
    hibernate:
      ddl-auto: validate
    #defer-datasource-initialization: true
    show-sql: true
  sql:
    init:
      mode: always

---
spring:
  config:
    activate:
      on-profile: prod
  jpa:
    hibernate:
      ddl-auto: validate

